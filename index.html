<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad Wijaya – PT Koki Sehat Sejahtera</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Library QR Code (canvas-based, support logo overlay) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background Dekoratif -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <!-- ── CARD ──────────────────────────────────────────────── -->
  <div class="card">

    <!-- Header: Foto Profil -->
    <div class="card-header">
      <img
        src="profile.png"
        alt="Ahmad Wijaya"
        class="header-photo"
        id="headerPhoto"
        onerror="showAvatarFallback()"
      >
      <div class="avatar-fallback hidden" id="avatarFallback">
        <span class="avatar-init" id="avatarInitials">AW</span>
      </div>
    </div>

    <!-- Nama & Jabatan -->
    <div class="profile-info">
      <div class="company" id="companyName">PT Koki Sehat Sejahtera</div>
      <h1 class="name" id="profileName">Ahmad Wijaya, S.T., M.M.</h1>
      <p class="position" id="profileTitle">Direktur Utama</p>
      <!-- <p class="bio-text">"Pangan sehat bukan kemewahan — ia adalah hak setiap keluarga Indonesia."</p> -->
    </div>

    <!-- Tombol Aksi Cepat: Telepon, Email, Website -->
    <div class="quick-actions-grid">

      <a href="tel:+628123456789" class="qa-box-btn" id="qaPhone">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.34 2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.81-.81a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span>Telepon</span>
      </a>

      <a href="mailto:ahmad@kokisehat.co.id" class="qa-box-btn" id="qaEmail">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span>Email</span>
      </a>

      <a href="https://kokisehat.co.id" target="_blank" rel="noopener" class="qa-box-btn" id="qaWeb">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>Website</span>
      </a>

    </div>

    <!-- Kartu Kontak: Telepon, Email, Website, WhatsApp & Alamat -->
    <div class="contacts-cards-list">

      <!-- Telepon -->
      <div class="ci-card">
        <div class="ci-ico">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.34 2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.81-.81a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="ci-content">
          <div class="ci-lbl">Telepon</div>
          <div class="ci-val">
            <a href="tel:+628123456789" id="phoneLink">+62 812-3456-789</a>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="ci-card">
        <div class="ci-ico">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="ci-content">
          <div class="ci-lbl">Email</div>
          <div class="ci-val">
            <a href="mailto:ahmad@kokisehat.co.id" id="emailLink">ahmad@kokisehat.co.id</a>
          </div>
        </div>
      </div>

      <!-- Website -->
      <div class="ci-card">
        <div class="ci-ico">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="ci-content">
          <div class="ci-lbl">Website</div>
          <div class="ci-val">
            <a href="https://kokisehat.co.id" target="_blank" rel="noopener" id="webLink">kokisehat.co.id</a>
          </div>
        </div>
      </div>

      <!-- WhatsApp -->
      <div class="ci-card">
        <div class="ci-ico">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <div class="ci-content">
          <div class="ci-lbl">WhatsApp</div>
          <div class="ci-val">
            <a href="https://wa.me/628123456789" target="_blank" rel="noopener" id="waLink">
              +62 812-3456-789
            </a>
          </div>
        </div>
      </div>

      <!-- Alamat -->
      <div class="ci-card">
        <div class="ci-ico">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div class="ci-content">
          <div class="ci-lbl">Alamat</div>
          <div class="ci-val">
            <a href="https://maps.google.com/?q=Boyolali,+Jawa+Tengah" target="_blank" rel="noopener" id="mapLink">
              Boyolali, Jawa Tengah
            </a>
          </div>
        </div>
        <a
          href="https://maps.google.com/?q=Boyolali,+Jawa+Tengah"
          class="ci-action"
          target="_blank"
          rel="noopener"
          id="mapBtn"
          aria-label="Buka di Peta"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
            <line x1="9" y1="3" x2="9" y2="18"/>
            <line x1="15" y1="6" x2="15" y2="21"/>
          </svg>
        </a>
      </div>

    </div>

    <!-- QR Code (Collapsible) -->
    <div class="qr-section">
      <button class="qr-toggle-btn" onclick="toggleQrCode()" aria-expanded="false" aria-controls="qrDrawer">
        <span>Bagikan via QR Code</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Wrapper luar untuk animasi grid -->
      <div class="qr-content" id="qrDrawer" role="region">
        <!-- Wrapper dalam (overflow: hidden) -->
        <div class="qr-content-inner">
          <div class="qr-inner">
            <div class="qr-box" id="qr"></div>
            <p class="qr-hint">Scan untuk menyimpan kontak ini langsung ke ponsel.</p>
          </div>
        </div>
      </div>
    </div>

  </div>
  <!-- ── END CARD ───────────────────────────────────────────── -->

  <!-- Toast Notifikasi -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
